<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">OCT_LatRes preview</title>
  <desc id="desc">An OCT B-scan analysis panel showing bead detection, profile extraction, and FWHM measurement.</desc>
  <rect width="960" height="540" fill="#f7faf9"/>
  <rect x="50" y="54" width="860" height="432" rx="24" fill="#ffffff" stroke="#d7e2df"/>
  <text x="84" y="108" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#243735">OCT lateral resolution</text>
  <text x="84" y="137" font-family="Inter, Arial, sans-serif" font-size="14" fill="#63706e">B-scan ingestion, bead detection, profile extraction, and FWHM statistics</text>

  <g transform="translate(86 184)">
