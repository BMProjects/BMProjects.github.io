    <text x="28" y="38" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#7b3d59">latent z</text>
    <circle cx="52" cy="94" r="11" fill="#a85e82"/>
    <circle cx="88" cy="76" r="11" fill="#d182a3"/>
    <circle cx="96" cy="124" r="11" fill="#8d4d70"/>
