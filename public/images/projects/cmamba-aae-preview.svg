    <rect x="28" y="70" width="82" height="14" rx="7" fill="#7b9ccf"/>
    <rect x="28" y="98" width="82" height="14" rx="7" fill="#557ebb"/>
    <rect x="28" y="126" width="82" height="14" rx="7" fill="#315f9b"/>
  </g>

  <g transform="translate(508 174)">
