<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">CMamba-AAE preview</title>
  <desc id="desc">A labelled chiller signal enters convolution, Mamba sequence blocks, an adversarial latent space, and generated fault samples.</desc>
  <rect width="960" height="540" fill="#f7f7f2"/>
  <rect x="48" y="58" width="864" height="424" rx="24" fill="#ffffff" stroke="#d8d6cc"/>
  <text x="84" y="108" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#2f332d">CMamba-AAE</text>
  <text x="84" y="138" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6d7168">conditional generation for labelled chiller fault signals</text>

  <g transform="translate(82 180)">
