    <path d="M32 80 C58 54 83 105 110 78" fill="none" stroke="#b37a15" stroke-width="5" stroke-linecap="round"/>
    <path d="M32 116 C58 90 83 141 110 114" fill="none" stroke="#d19a2a" stroke-width="5" stroke-linecap="round"/>
    <path d="M32 142 C58 116 83 167 110 140" fill="none" stroke="#e5bd63" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g transform="translate(704 174)">
